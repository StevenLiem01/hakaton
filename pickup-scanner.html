<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pickup Scanner - Laundry App</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.js"></script>
  <style>
    body{font-family:Segoe UI,Arial;background:#f6f9fc;padding:24px}
    .card{max-width:720px;margin:0 auto;background:#fff;padding:18px;border-radius:12px;box-shadow:0 8px 28px rgba(10,22,40,.06)}
    .scanner{position:relative;background:#000;border-radius:12px;overflow:hidden;height:420px}
    video{width:100%;height:100%;object-fit:cover}
    .frame{position:absolute;inset:10%;border:3px dashed #00ff66;border-radius:10px}
    .status{padding:12px;margin-top:12px;background:#f1f5f9;border-radius:8px;color:#0b1726}
    .info{margin-top:12px}
    button{padding:10px 14px;border-radius:8px;border:none;background:#0f7aff;color:#fff;font-weight:700;cursor:pointer}
    .btn-danger{background:#ef4444}
  </style>
</head>
<body>
  <div class="card">
    <h2>Scan QR Struk</h2>
    <p class="muted">Tunjukkan QR code dari pelanggan agar kasir dapat memproses pengambilan.</p>

    <div class="scanner" id="scanner">
      <video id="video" playsinline></video>
      <canvas id="canvas" style="display:none"></canvas>
      <div class="frame"></div>
    </div>

    <div class="status" id="status">⏳ Menunggu QR...</div>

    <div class="info" id="info" style="display:none">
      <h3>Data Pesanan</h3>
      <div id="orderData"></div>
      <div style="margin-top:12px">
        <button id="btnPickup">Tandai Diambil</button>
        <button id="btnReset" class="btn-danger">Reset</button>
      </div>
    </div>
  </div>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');
    const infoEl = document.getElementById('info');
    const orderDataEl = document.getElementById('orderData');
    const btnPickup = document.getElementById('btnPickup');
    const btnReset = document.getElementById('btnReset');

    let scanning = false;
    let animationId = null;
    let currentOrderId = null;

    async function initCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        video.srcObject = stream;
        await video.play();
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        statusEl.textContent = '🔍 Kamera siap. Arahkan QR ke dalam kotak.';
        startScan();
      } catch (err) {
        statusEl.textContent = '❌ Tidak bisa mengakses kamera: ' + err.message;
      }
    }

    function startScan() {
      scanning = true;
      scan();
    }
    function stopScan() {
      scanning = false;
      if (animationId) cancelAnimationFrame(animationId);
    }

    function scan() {
      if (!scanning) return;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'dontInvert' });
      if (code) {
        handleCode(code.data);
      } else {
        animationId = requestAnimationFrame(scan);
      }
    }

    async function handleCode(data) {
      stopScan();
      statusEl.textContent = '✅ QR terbaca: ' + data;
      currentOrderId = data;
      // fetch order data
      try {
        const res = await fetch('/api/pesanan/' + encodeURIComponent(data));
        const json = await res.json();
        if (!res.ok || !json.success) throw new Error(json.message || 'Pesanan tidak ditemukan');
        const o = json.data;
        orderDataEl.innerHTML = `<p><strong>ID:</strong> ${o.id}</p><p><strong>Nama:</strong> ${o.nama}</p><p><strong>No WA:</strong> ${o.noWa}</p><p><strong>Layanan:</strong> ${o.layanan}</p><p><strong>Berat:</strong> ${o.berat} kg</p><p><strong>Status:</strong> ${o.status}</p>`;
        infoEl.style.display = 'block';
      } catch (err) {
        statusEl.textContent = '⚠️ ' + err.message;
      }
    }

    btnPickup.addEventListener('click', async () => {
      if (!currentOrderId) return;
      try {
        const res = await fetch('/api/pickup/' + encodeURIComponent(currentOrderId), { method: 'POST' });
        const json = await res.json();
        if (!res.ok || !json.success) throw new Error(json.message || 'Gagal');
        statusEl.textContent = '✅ Pesanan ditandai Diambil.';
        btnPickup.disabled = true;
      } catch (err) {
        statusEl.textContent = '❌ ' + err.message;
      }
    });

    btnReset.addEventListener('click', () => {
      infoEl.style.display = 'none';
      orderDataEl.innerHTML = '';
      currentOrderId = null;
      statusEl.textContent = '🔍 Menunggu QR...';
      startScan();
    });

    window.addEventListener('load', initCamera);
    window.addEventListener('beforeunload', () => {
      if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
    });
  </script>
</body>
</html>
